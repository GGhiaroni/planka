<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abrir Chamado Técnico</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 32px 16px 64px;
      color: #222;
    }

    .page-header {
      max-width: 680px;
      margin: 0 auto 24px;
    }

    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1a1a2e;
    }

    .page-header p {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #666;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: #d32f2f;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover { text-decoration: underline; }

    .section {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
      padding: 28px 32px;
      max-width: 680px;
      margin: 0 auto 20px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #d32f2f;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #fde7e7;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 560px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .section { padding: 20px 18px; }
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    label .req { color: #e53e3e; margin-left: 2px; }

    input[type="text"],
    input[type="tel"],
    select,
    textarea {
      padding: 9px 12px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 0.93rem;
      font-family: inherit;
      color: #222;
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #d32f2f;
    }

    textarea { resize: vertical; min-height: 110px; }

    /* Priority dropdown — colored options */
    select[name="prioridade"] {
      font-weight: 600;
    }

    /* Radio group */
    .radio-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 2px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
      color: #333;
    }

    .radio-group input[type="radio"] {
      width: 16px; height: 16px;
      accent-color: #d32f2f;
      cursor: pointer;
    }

    /* Submit */
    .submit-section { max-width: 680px; margin: 0 auto; }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #d32f2f;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) { background: #b71c1c; }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      margin-top: 16px;
      padding: 16px 18px;
      border-radius: 9px;
      font-size: 0.92rem;
      display: none;
    }

    #message.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      display: block;
      animation: shake .4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .btn-loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success overlay */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    .success-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      text-align: center;
      max-width: 460px;
      width: 90%;
      animation: slideUp .5s cubic-bezier(.22,.68,0,1.1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: popIn .5s cubic-bezier(.22,.68,0,1.3) .2s both;
    }

    @keyframes popIn {
      from { transform: scale(0); } to { transform: scale(1); }
    }

    .success-icon svg {
      width: 36px; height: 36px;
      stroke: #fff; stroke-width: 3; fill: none;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .success-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .success-card p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .os-badge {
      display: inline-block;
      margin: 0 0 20px;
      padding: 6px 14px;
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 6px;
      font-family: 'SF Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .btn-new {
      display: inline-block;
      padding: 12px 32px;
      background: #d32f2f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-new:hover { background: #b71c1c; }
  </style>
</head>
<body>

  <div class="page-header">
    <a href="/" class="back-link">← Voltar</a>
    <h1>Abrir Chamado Técnico</h1>
    <p>Preencha os dados do chamado para abertura da ordem de serviço.</p>
  </div>

  <form id="form">

    <!-- IDENTIFICAÇÃO -->
    <div class="section">
      <div class="section-title">Identificação</div>
      <div class="grid-2">
        <div class="field full">
          <label>Cliente / Nome do Posto <span class="req">*</span></label>
          <input type="text" name="cliente" required />
        </div>
        <div class="field">
          <label>Rede</label>
          <input type="text" name="rede" placeholder="Ex: ELLG, PostosRios" />
        </div>
        <div class="field">
          <label>Bandeira ou Tipo <span class="req">*</span></label>
          <select name="bandeira" required>
            <option value="" disabled selected>Selecione...</option>
            <option>Shell</option>
            <option>Petrobras</option>
            <option>Ipiranga</option>
            <option>Ale</option>
            <option>Petronas</option>
            <option>Rodoil</option>
            <option>Branca</option>
            <option>BR</option>
            <option>Loja</option>
            <option>Outros</option>
          </select>
        </div>
      </div>
    </div>

    <!-- LOCALIZAÇÃO -->
    <div class="section">
      <div class="section-title">Localização</div>
      <div class="grid-2">
        <div class="field full">
          <label>Endereço (Rua, Nº, Bairro)</label>
          <input type="text" name="endereco" placeholder="R. das Flores, 123 - Centro" />
        </div>
        <div class="grid-3 field full" style="display: grid; gap: 16px;">
          <div class="field">
            <label>Cidade <span class="req">*</span></label>
            <input type="text" name="cidade" required />
          </div>
          <div class="field">
            <label>Estado <span class="req">*</span></label>
            <input type="text" name="estado" maxlength="2" placeholder="RJ" required
              style="text-transform: uppercase;" />
          </div>
          <div class="field">
            <label>CEP</label>
            <input type="text" name="cep" id="cep" maxlength="9" placeholder="00000-000" />
          </div>
        </div>
      </div>
    </div>

    <!-- CHAMADO -->
    <div class="section">
      <div class="section-title">Chamado</div>
      <div class="grid-2">
        <div class="field">
          <label>Prioridade <span class="req">*</span></label>
          <select name="prioridade" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="MÁXIMA PRIORIDADE">🟣 MÁXIMA PRIORIDADE</option>
            <option value="URGÊNCIA">🔴 URGÊNCIA</option>
            <option value="MÉDIA GRAVIDADE">🟡 MÉDIA GRAVIDADE</option>
            <option value="BAIXA PRIORIDADE">🟢 BAIXA PRIORIDADE</option>
            <option value="PENDÊNCIAS DE INSTALAÇÃO">🟠 PENDÊNCIAS DE INSTALAÇÃO</option>
            <option value="EM ESPERA">🩷 EM ESPERA</option>
          </select>
        </div>
        <div class="field">
          <label>Garantia <span class="req">*</span></label>
          <div class="radio-group" style="padding-top: 10px;">
            <label><input type="radio" name="garantia" value="Sim" required /> Sim</label>
            <label><input type="radio" name="garantia" value="Não" /> Não</label>
          </div>
        </div>
        <div class="field full">
          <label>Motivo do Chamado <span class="req">*</span></label>
          <textarea name="motivo" placeholder="Descreva detalhadamente o problema..." required maxlength="5000"></textarea>
        </div>
      </div>
    </div>

    <!-- SUBMIT -->
    <div class="submit-section">
      <button type="submit" id="submitBtn">Abrir Chamado</button>
      <div id="message" role="alert" aria-live="polite"></div>
    </div>

  </form>

  <script>
    const form = document.getElementById('form');
    const submitBtn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');

    // Uppercase estado automaticamente
    document.querySelector('[name="estado"]').addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase();
    });

    // Máscara CEP
    document.getElementById('cep').addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '').slice(0, 8);
      if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
      e.target.value = v;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const data = {};
      for (const el of form.elements) {
        if (!el.name || el.disabled) continue;
        if ((el.type === 'radio') && !el.checked) continue;
        if (el.value !== '') data[el.name] = el.value;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="btn-loading"><span class="spinner"></span> Abrindo chamado...</span>';

      try {
        const res = await fetch('/api/manutencao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const body = await res.json();

        if (res.ok && body.ok) {
          showSuccess(body.os);
        } else {
          showError(body.error || 'Erro inesperado. Tente novamente.');
        }
      } catch {
        showError('Falha na conexão. Tente novamente.');
      }
    });

    function showSuccess(os) {
      const overlay = document.createElement('div');
      overlay.className = 'success-overlay';
      overlay.innerHTML = `
        <div class="success-card">
          <div class="success-icon">
            <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" /></svg>
          </div>
          <h2>Chamado aberto!</h2>
          <p>Sua ordem de serviço foi registrada:</p>
          <div class="os-badge">OS Nº ${os}</div>
          <p style="margin-bottom: 28px;">A equipe técnica foi notificada e entrará em contato em breve.</p>
          <button class="btn-new" onclick="location.reload()">Abrir outro chamado</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function showError(msg) {
      messageEl.className = 'error';
      messageEl.innerHTML = '<strong>Erro:</strong> ' + msg;
      messageEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      submitBtn.disabled = false;
      submitBtn.textContent = 'Abrir Chamado';
    }

    function clearMessage() {
      messageEl.className = '';
      messageEl.innerHTML = '';
    }
  </script>
</body>
</html>
